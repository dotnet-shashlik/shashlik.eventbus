name: test

on:
  push:
    branches: [ test ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1.7.2
        with:
          dotnet-version: 8.0.422

      - name: Setup MySql
        uses: mirromutth/mysql-action@v1.1
        with:
          mysql version: '8.0'
          mysql root password: '123123'
          mysql user: 'testuser'
          mysql password: '123123'

      - name: Setup RabbitMQ
        uses: nijel/rabbitmq-action@v1.0.0

      - name: Setup Kafka
        uses: 280780363/kafka-action@v1.0
        with:
          kafka version: '4.2.1'
          
      - name: Setup MongoDb
        uses: 280780363/mongo-action@v1.0
        with:
          version: 8.0.0
          username: mongo
          password: 123123
        
      - name: Setup Pulsar
        uses: reugn/github-action-pulsar@v1
        with:
          version: 4.2.2
        
      - name: Setup Redis
        uses: getong/redis-action@v1
        with:
          redis password: '123123'
          redis version: 6.2.7

      - name: Test
        run: dotnet test ./src/Shashlik.EventBus.sln
        env:
          DOTNET_ENVIRONMENT: GitHub