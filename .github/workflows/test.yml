name: test

on:
  push:
    branches: [ test ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123123
          MYSQL_DATABASE: test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: 123123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p123123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      rabbitmq:
        image: rabbitmq
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mongodb:
        image: mongo:8.0
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo
          MONGO_INITDB_ROOT_PASSWORD: 123123
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      kafka:
        image: confluentinc/cp-kafka:7.8.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.422

      # ---------------- Kafka Wait ----------------
      - name: Wait Kafka
        run: |
          echo "Waiting Kafka..."

          for i in $(seq 1 60); do
            nc -z localhost 9092 && echo "Kafka port ready" && break
            sleep 2
          done

      # ---------------- Pulsar (docker run) ----------------
      - name: Start Pulsar
        run: |
          docker run -d \
            --name pulsar \
            -p 6650:6650 \
            -p 8080:8080 \
            apachepulsar/pulsar:4.2.2 \
            bin/pulsar standalone

      - name: Wait Pulsar
        run: |
          echo "Waiting Pulsar..."

          for i in $(seq 1 60); do
            curl -fs http://localhost:8080/admin/v2/clusters >/dev/null && echo "Pulsar ready" && break
            sleep 2
          done

      # ---------------- Test ----------------
      - name: Test
        run: dotnet test ./src/Shashlik.EventBus.sln
        env:
          DOTNET_ENVIRONMENT: GitHub